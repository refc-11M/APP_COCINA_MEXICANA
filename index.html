<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sabor Mexicano - Restaurante de comida tradicional mexicana en Villa Victoria. Menú de platillos, bebidas, postres y datos de contacto.">
    <meta name="author" content="Sabor Mexicano">
    <title>COCINA MEXICANA</title>
</head>
<body>
    
    <header>
        <h1>Todo hecho con sabor Mexicano</h1>
        <p>Platillos tradicionales hechos con ingredientes frescos, ricos y con cariño</p>
    </header>

    <section class="botones-seccion" aria-label="Navegación por secciones del restaurante">
        <div class="botones-container">
            <button class="btn-apartado" id="btn-platillos" aria-pressed="false" aria-controls="item-platillos">
                Menú de Platillos
            </button>
            <button class="btn-apartado" id="btn-bebidas" aria-pressed="false" aria-controls="item-bebidas">
                Bebidas Típicas
            </button>
            <button class="btn-apartado" id="btn-postres" aria-pressed="false" aria-controls="item-postres">
                Postres Mexicanos
            </button>
            <button class="btn-apartado" id="btn-contacto" aria-pressed="false" aria-controls="item-contacto">
                Contacto y Ubicación
            </button>
        </div>
    </section>

    
    <section class="contenido-seccion" aria-label="Contenido del restaurante">
        <div class="contenido-item" id="item-platillos">
            <h2>Platillos Destacados</h2>
            <img 
                src="https://raw.githubusercontent.com/refc-11M/APP_COCINA_MEXICANA/main/img/tacos.webp" 
                alt="Tacos al pastor con piña" 
               loading="lazy"
              >
          <img
              src="https://raw.githubusercontent.com/refc-11M/APP_COCINA_MEXICANA/main/img/enchiladas.webp"
              alt="Enchiladas rojas con crema"
             loading="lazy"
            >
          <img
            src="https://raw.githubusercontent.com/refc-11M/APP_COCINA_MEXICANA/main/img/pozole.webp"
              alt="Pozole rojo con carne de cerdo"
                loading="lazy"
            >
            <p>¡Disfruta tu platillo!</p>
        </div>

        <div class="contenido-item" id="item-bebidas">
            <h2> Bebidas Típicas</h2>
            <img 
                src="https://raw.githubusercontent.com/refc-11M/APP_COCINA_MEXICANA/main/img/agua.webp" 
                alt="Agua de jamaica roja"  
                loading="lazy"
            >
          <img 
                src="https://raw.githubusercontent.com/refc-11M/APP_COCINA_MEXICANA/main/img/michelada.webp" 
                alt="Michelada con limón"
                loading="lazy"
            >
          <img 
                src="https://raw.githubusercontent.com/refc-11M/APP_COCINA_MEXICANA/main/img/cerveza.jpg" 
                alt="Cerveza chica Corona"
                loading="lazy"
            >
            <p>Completa tu comida con nuestras bebidas </p>
        </div>

        <div class="contenido-item" id="item-postres">
            <h2>Postres </h2>
            <img 
                src="https://images.unsplash.com/photo-1542281286-9e0a16bb7366?ixlib=rb-4.0.3&auto=format&fit=crop&w=900&q=80" 
                alt="Flan de cajeta con caramelo"
                loading="lazy"
            >
          <img 
                src="https://raw.githubusercontent.com/refc-11M/APP_COCINA_MEXICANA/main/img/pastel.webp" 
                alt="Pastel de elote"
                loading="lazy"
            >
          <img 
                src="https://raw.githubusercontent.com/refc-11M/APP_COCINA_MEXICANA/main/img/churros.webp" 
                alt="Churros con cajeta"
                loading="lazy"
            >
            
        </div>

        <div class="contenido-item" id="item-contacto">
            <h2>Encuéntranos Aquí</h2>
      
            <p>San Jose Villa de Allende, Calle Pancho Barraza, seccion V</p>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
